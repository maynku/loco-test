<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live College Bus Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="/asset/css/style.css" />
    
    <style>
        /* 🔐 Login Box Styling */
        #login-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; background: #f4f7f6;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; font-family: Arial, sans-serif;
        }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .login-box input {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 10px; background: #28a745; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        .login-box button:hover { background: #218838; }
        .error-msg { color: red; font-size: 14px; margin-bottom: 10px; text-align: center; display: none; }
        
        /* 🗺️ Map Container Setup */
        #map-container { display: none; }
        .logout-btn { 
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            padding: 8px 15px; background: #dc3545; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1️⃣ LOGIN FORM SECTION -->
    <div id="login-container">
        <div class="login-box">
            <h2>Beta Tester Login</h2>
            <div id="error-message" class="error-msg"></div>
            <input type="text" id="username" placeholder="Enter Username" required>
            <input type="password" id="password" placeholder="Enter Password" required>
            <button onclick="handleLogin()">Login</button>
        </div>
    </div>

    <!-- 2️⃣ MAP SECTION (Shuru mein hidden rahega)
    <div id="map-container">
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
        <div class="info-box">
            Active Buses: <span id="bus-count">0</span>
        </div>
        <div id="map"></div>
    </div> -->

    <!-- 1NEw bus section with button--> 
    <div id="map-container">
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
        
        <!-- 🎛️ Control Box: Active count ke theek neeche input aur button jadd diya -->
        <div class="info-box">
            <div>Active Buses: <span id="bus-count">0</span></div>
            <hr style="margin: 5px 0; border: 0; border-top: 1px solid #eee;">
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="text" id="search-bus-id" placeholder="Enter Bus ID (e.g. TESTBUS1)" style="padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 150px; font-size: 13px;">
                <button onclick="handleBusSearchClick()" style="padding: 6px 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;">Show Path</button>
            </div>
        </div>
        
        <div id="map"></div>
    </div>

    <!-- ⚙️ SCRIPT INCLUSION -->
     <!-- absolute path se load krne ka try kr rhe hain, taki server par bhi sahi se load ho jaye -->
    <!-- <script src="./asset/js/mapSetup.js"></script> -->
    <script src="./asset/js/mapSetup.js" defer></script>
</body>
</html>
