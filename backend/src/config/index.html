<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Live Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="/socket.io/socket.io.js"></script>

    <script>
        // 1. Map Initialize karo (Patna ka default coordinate)
        const map = L.map('map').setView([25.6, 85.1], 13);

        // 2. Map Tiles add karo
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Marker banayo
        const marker = L.marker([25.6, 85.1]).addTo(map);

        // 4. Socket.io se connect karo
        const socket = io();

        // 5. 'live-update' event ko suno
        socket.on('live-update', (data) => {
            console.log("Data received:", data);
            
            // Marker aur Map ko naye location par move karo
            marker.setLatLng([data.lat, data.lng]);
            map.panTo([data.lat, data.lng]);
        });
    </script>
</body>
</html>
