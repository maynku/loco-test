<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bus Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const map = L.map('map').setView([25.6, 85.1], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([25.6, 85.1]).addTo(map);

        function trackMe() {
            if (navigator.geolocation) {
                // Pehli baar turant run karo
                navigator.geolocation.getCurrentPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    socket.emit("bus-location", { busId: "MY_DEVICE", lat: latitude, lng: longitude });
                });

                // Har 1 minute mein repeat karo
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const { latitude, longitude } = position.coords;
                        socket.emit("bus-location", { busId: "MY_DEVICE", lat: latitude, lng: longitude });
                        marker.setLatLng([latitude, longitude]);
                        map.panTo([latitude, longitude]);
                    });
                }, 60000); 
            }
        }
        trackMe();
        
        // Server se update aane par map update karo
        socket.on('live-update', (data) => {
            marker.setLatLng([data.lat, data.lng]);
            map.panTo([data.lat, data.lng]);
        });
    </script>
</body>
</html>
